<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HACKNEWS // ADVANCED INTEL SUITE v2.0</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --panel: #111; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        
        /* Layout */
        .wrapper { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
        
        /* Sidebar */
        .sidebar { background: #0a0a0a; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: bold; color: var(--neon); text-shadow: 0 0 10px var(--neon); margin-bottom: 30px; }
        .nav-btn { background: none; border: 1px solid #333; color: #888; padding: 12px; margin-bottom: 10px; cursor: pointer; text-align: left; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,65,0.05); }

        /* Terminal Output */
        #console { background: #000; border: 1px solid #222; height: 150px; font-size: 11px; padding: 10px; color: var(--neon); overflow-y: auto; margin-top: auto; }

        /* Main Content */
        .main { padding: 30px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        /* News Cards */
        .card { background: var(--panel); border: 1px solid #222; padding: 20px; border-radius: 4px; position: relative; transition: 0.2s; }
        .card:hover { border-color: var(--neon); transform: scale(1.02); box-shadow: 0 0 20px rgba(0,255,65,0.1); }
        .tag { position: absolute; top: 10px; right: 10px; font-size: 10px; padding: 2px 6px; border: 1px solid var(--neon); color: var(--neon); }
        .card h3 { font-size: 16px; margin: 15px 0 10px 0; line-height: 1.4; }
        .card p { font-size: 13px; color: #999; }
        .card a { color: var(--neon); text-decoration: none; font-size: 12px; font-weight: bold; }
        
        .loading { text-align: center; color: var(--neon); margin-top: 50px; font-size: 20px; letter-spacing: 5px; }
    </style>
</head>
<body>

<div class="wrapper">
    <aside class="sidebar">
        <div class="logo">HACK NEWS </div>
        <button class="nav-btn active" onclick="loadNews('cybersecurity')">Global Feed</button>
        <button class="nav-btn" onclick="loadNews('ransomware')">Ransomware</button>
        <button class="nav-btn" onclick="loadNews('vulnerability')">Vulnerabilities</button>
        <button class="nav-btn" onclick="loadLocal()">Local Scraped Data</button>
        
        <div id="console">>_ System Ready...</div>
    </aside>

    <main class="main">
        <div class="grid" id="newsGrid">
            <div class="loading">INITIALIZING SECURE LINK...</div>
        </div>
    </main>
</div>

<script>
    const API_KEY = 'pub_90cc436f169643c69ffecbdf2f56d364';
    const log = document.getElementById('console');
    const grid = document.getElementById('newsGrid');

    function writeLog(msg) {
        log.innerHTML += `<div>>_ ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    async function loadNews(query) {
        grid.innerHTML = '<div class="loading">BYPASSING FIREWALLS...</div>';
        writeLog(`Requesting remote intel for: ${query}`);
        
        try {
            const res = await fetch(`https://newsdata.io/api/1/news?apikey=${API_KEY}&q=${query}&language=en`);
            const data = await res.json();
            
            if(data.results && data.results.length > 0) {
                render(data.results);
                writeLog(`Successfully decrypted ${data.results.length} packets.`);
            } else {
                writeLog(`Warning: No remote data found. Key limit reached?`);
                loadLocal(); // Auto-fallback
            }
        } catch(e) {
            writeLog(`Remote Connection Error. Switching to Local Intel.`);
            loadLocal();
        }
    }

    async function loadLocal() {
        writeLog(`Accessing local database (intel_data.json)...`);
        try {
            const res = await fetch('intel_data.json');
            const data = await res.json();
            render(data);
            writeLog(`Local buffer loaded.`);
        } catch(e) {
            writeLog(`CRITICAL: Local database not found. Run scraper.py first.`);
            grid.innerHTML = '<p style="color:red; text-align:center;">ERROR: NO DATA SOURCES FOUND.<br>1. Run scraper.py<br>2. Use Live Server (VS Code)</p>';
        }
    }

    function render(articles) {
        grid.innerHTML = '';
        articles.forEach(art => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <span class="tag">${art.tag || 'NEW'}</span>
                <small style="color:#555">${(art.source_id || 'LOCAL').toUpperCase()}</small>
                <h3>${art.title}</h3>
                <p>${art.description ? art.description.substring(0, 100) : 'No description available.'}...</p>
                <a href="${art.link}" target="_blank">VIEW INTEL →</a>
            `;
            grid.appendChild(div);
        });
    }

    // Start with default news
    window.onload = () => loadNews('cybersecurity');
</script>

</body>
</html>
